<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Econstrução Prática · Operações</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080f;--surface:#0f0f1a;--card:#141420;--card2:#1a1a28;
  --border:#1e1e30;--border2:#252538;--text:#eeeef5;--muted:#6868a0;--muted2:#3d3d60;
  --green:#22c55e;--green-bg:#22c55e18;--green-bd:#22c55e30;
  --red:#f43f5e;--red-bg:#f43f5e18;--red-bd:#f43f5e30;
  --yellow:#f59e0b;--yellow-bg:#f59e0b18;--yellow-bd:#f59e0b30;
  --blue:#38bdf8;--blue-bg:#38bdf818;--blue-bd:#38bdf830;
  --accent:#7c6af7;--accent2:#a89ff8;--accent-bg:#7c6af718;
  --nav-h:64px;--header-h:56px;
}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;overflow:hidden}
*{scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
input,select,textarea,button{font-family:'DM Sans',sans-serif;font-size:14px}
button{cursor:pointer}
img{max-width:100%;height:auto;display:block}

.app-root{display:flex;flex-direction:column;height:100vh;overflow:hidden}
@media(min-width:768px){.app-root{flex-direction:row}}

.sidebar{display:none;width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);flex-direction:column;height:100vh;position:sticky;top:0}
@media(min-width:768px){.sidebar{display:flex}}

.mobile-header{background:var(--surface);border-bottom:1px solid var(--border);height:var(--header-h);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;position:sticky;top:0;z-index:90}
@media(min-width:768px){.mobile-header{display:none}}

.main-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px 80px 16px;min-height:0}
@media(min-width:768px){.main-content{padding:28px 32px 32px 32px}}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
@media(min-width:768px){.bottom-nav{display:none}}

.grid-3{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:480px){.grid-3{grid-template-columns:1fr 1fr}}
@media(min-width:900px){.grid-3{grid-template-columns:1fr 1fr 1fr}}

.grid-2{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:500px){.grid-2{grid-template-columns:1fr 1fr}}

.settings-grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:700px){.settings-grid{grid-template-columns:1fr 1fr}}

.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(min-width:600px){.kpi-row{gap:14px}}

.modal-overlay{position:fixed;inset:0;background:#00000090;display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
@media(min-width:600px){.modal-overlay{align-items:center}}

.modal-box{background:var(--card);border:1px solid var(--border2);width:100%;max-width:100%;border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal-box{max-width:660px;border-radius:20px;max-height:88vh}}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
@media(min-width:768px){.card{padding:20px}}

.form-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:12px 14px;color:var(--text);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--accent)}

.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px 20px;font-weight:700;font-size:14px;width:100%;transition:opacity .15s}
.btn-primary:active{opacity:.8}
.btn-secondary{background:transparent;color:var(--muted);border:1px solid var(--border2);border-radius:10px;padding:12px 20px;font-weight:500;width:100%}

.page-label{color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.page-title{font-size:24px;font-weight:700;line-height:1.1}
@media(min-width:768px){.page-title{font-size:34px}}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .22s ease forwards}

.filters-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.filters-row::-webkit-scrollbar{display:none}
.filter-btn{padding:7px 14px;border-radius:99px;border:1px solid var(--border2);white-space:nowrap;font-size:13px;color:var(--muted);background:transparent;transition:all .15s;flex-shrink:0}
.filter-btn.active{background:var(--text);color:var(--bg);font-weight:600;border-color:var(--text)}

.cal-cell{min-height:80px;padding:5px;border-left:1px solid var(--border)}
@media(min-width:600px){.cal-cell{min-height:100px;padding:8px}}

.toggle-track{width:42px;height:24px;border-radius:99px;border:none;position:relative;transition:background .2s;cursor:pointer;flex-shrink:0}
.toggle-thumb{position:absolute;top:3px;width:18px;height:18px;border-radius:99px;background:#fff;transition:left .2s;box-shadow:0 1px 4px #0005}

.badge{display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:3px 9px;font-size:12px;font-weight:600}

.pipeline{display:flex;align-items:center;overflow-x:auto;padding:4px 0 8px;scrollbar-width:none}
.pipeline::-webkit-scrollbar{display:none}
.pipe-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.pipe-dot{width:26px;height:26px;border-radius:99px;display:flex;align-items:center;justify-content:center;border:2px solid var(--border2)}
.pipe-line{flex:1;height:2px;min-width:20px;background:var(--border2);margin:0 4px;margin-bottom:18px}

.foto-slot{background:var(--surface);border:1px dashed var(--border2);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:border-color .15s;min-height:100px;padding:16px}
.foto-slot:hover,.foto-slot:active{border-color:var(--accent)}
.foto-img{width:100%;height:120px;object-fit:cover;border-radius:10px}
@media(min-width:500px){.foto-img{height:140px}}

.hist-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:6px;height:6px;border-radius:99px;background:var(--accent);margin-top:5px;flex-shrink:0}

.nav-item-mobile{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;padding:8px 4px;border:none;background:transparent;color:var(--muted);font-size:9px;font-weight:500;letter-spacing:.04em;transition:color .15s;position:relative}
.nav-item-mobile.active{color:var(--accent2)}

.nav-item-desktop{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:500;width:100%;text-align:left;transition:all .15s;cursor:pointer}
.nav-item-desktop.active{background:var(--accent-bg);color:var(--accent2);font-weight:600}
.nav-item-desktop:hover:not(.active){background:var(--border);color:var(--text)}

.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 22px;width:100%;max-width:400px;box-shadow:0 32px 80px #00000077}
@media(min-width:480px){.login-card{padding:40px 36px}}

.users-list{display:flex;flex-direction:column;gap:10px}
.user-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
</style>
</head>

const db={
  // USUÁRIOS
  async getUsers(){const{data}=await sb.from('usuarios').select('*').order('nome');return data||[];},
  async addUser(u){await sb.from('usuarios').insert(u);},
  async updateUser(email,patch){await sb.from('usuarios').update(patch).eq('email',email);},
  // PENDENTES
  async getPendentes(){const{data}=await sb.from('pendentes').select('*').order('criado_em');return data||[];},
  async addPendente(u){await sb.from('pendentes').insert(u);},
  async deletePendente(email){await sb.from('pendentes').delete().eq('email',email);},
  // PEDIDOS
  async getPedidos(){const{data}=await sb.from('pedidos').select('*').order('entrega');return data||[];},
  async savePedido(p){
    const row={id:p.id,nf:p.nf||'',cliente:p.cliente,data_pedido:p.dataPedido||null,entrega:p.entrega,
      vendedor:p.vendedor||'',etapa:p.etapa,ultima_at:p.ultimaAt,obs:p.obs||'',
      produto:p.produto||'',quantidade:p.quantidade||'',area_entrega:p.areaEntrega||'',
      foto_pedido:p.fotoPedido||null,foto_producao:p.fotoP||null,foto_entrega:p.fotoE||null,historico:p.hist||[]};
    await sb.from('pedidos').upsert(row,{onConflict:'id'});
  },
  // FOTOS — upload para storage, retorna URL pública
  async uploadFoto(pedidoId,tipo,dataUrl){
    // converter dataUrl para blob
    const res=await fetch(dataUrl);
    const blob=await res.blob();
    const ext=blob.type.includes('png')?'png':'jpg';
    const path=`${pedidoId}/${tipo}-${Date.now()}.${ext}`;
    const{data,error}=await sb.storage.from('fotos-pedidos').upload(path,blob,{upsert:true,contentType:blob.type});
    if(error)throw error;
    const{data:urlData}=sb.storage.from('fotos-pedidos').getPublicUrl(path);
    return urlData.publicUrl;
  },
};

// Converter row do banco para formato do app
function rowToApp(r){
  return{
    id:r.id,nf:r.nf||'',cliente:r.cliente,dataPedido:r.data_pedido||'',
    entrega:r.entrega,vendedor:r.vendedor||'',etapa:r.etapa,
    ultimaAt:r.ultima_at||r.entrega,obs:r.obs||'',
    produto:r.produto||'',quantidade:r.quantidade||'',areaEntrega:r.area_entrega||'',
    hist:Array.isArray(r.historico)?r.historico:[],
    fotoPedido:r.foto_pedido||null,fotoP:r.foto_producao||null,fotoE:r.foto_entrega||null
  };
}

// ── UTILS ─────────────────────────────────────────────
const diasDiff=s=>{const d=new Date(s+'T12:00:00');return Math.round((d-HOJE)/86400000);};
const diasParado=s=>{const d=new Date(s+'T12:00:00');return Math.max(0,Math.round((HOJE-d)/86400000));};
const calcStatus=p=>{
  if(p.etapa==='Entregue')return'confirmado';
  const d=diasDiff(p.entrega);
  if(d<0)return'atrasado';
  if(d<=2)return'atencao';
  return'proximo';
};
const etqDias=entrega=>{
  const d=diasDiff(entrega);
  if(d===0)return{txt:'HOJE',cor:'var(--red)'};
  if(d<0)return{txt:`${Math.abs(d)}d atraso`,cor:'var(--red)'};
  if(d===1)return{txt:'1 dia',cor:'var(--yellow)'};
  return{txt:`${d} dias`,cor:d<=2?'var(--yellow)':'var(--blue)'};
};
const fmtD=s=>{if(!s)return'';const d=new Date(s+'T12:00:00');return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;};
const agora=()=>new Date().toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
const validaSenha=s=>{
  if(s.length<8)return'Mínimo 8 caracteres';
  if(!/[A-Z]/.test(s))return'Precisa de 1 maiúscula';
  if(!/[a-z]/.test(s))return'Precisa de 1 minúscula';
  if(!/[0-9]/.test(s))return'Precisa de 1 número';
  return null;
};

// ── APP ROOT ──────────────────────────────────────────
function App(){
  const [users,setUsers]=useState([]);
  const [pendentes,setPendentes]=useState([]);
  const [pedidos,setPedidos]=useState([]);
  const [user,setUser]=useState(null);
  const [pag,setPag]=useState('dashboard');
  const [alertCfg,setAlertCfg]=useState({ativo:true,escopo:'ambos',intervalo:30});
  const [notifs,setNotifs]=useState([]);
  const [loading,setLoading]=useState(true);

  // Carregar dados do Supabase ao iniciar
  useEffect(()=>{
    async function init(){
      try{
        const[us,pds,pends]=await Promise.all([
          db.getUsers().catch(()=>[]),
          db.getPedidos().catch(()=>[]),
          db.getPendentes().catch(()=>[])
        ]);
        const listaUsers=us.length?us:USERS_INIT;
        setUsers(listaUsers);
        setPedidos(pds.length?pds.map(rowToApp):PEDIDOS_INIT);
        setPendentes(pends);
        // Restaurar sessão salva
        try{
          const saved=localStorage.getItem('orderly_session');
          if(saved){
            const{email,senha}=JSON.parse(saved);
            const u=listaUsers.find(x=>x.email===email&&x.senha===senha&&x.ativo);
            if(u){setUser(u);setPag('dashboard');}
            else{localStorage.removeItem('orderly_session');}
          }
        }catch(ex){}
      }catch(err){
        console.error('Erro ao carregar dados:',err);
        setUsers(USERS_INIT);
        setPedidos(PEDIDOS_INIT);
        // Tentar restaurar sessão mesmo com erro
        try{
          const saved=localStorage.getItem('orderly_session');
          if(saved){
            const{email,senha}=JSON.parse(saved);
            const u=USERS_INIT.find(x=>x.email===email&&x.senha===senha&&x.ativo);
            if(u){setUser(u);setPag('dashboard');}
          }
        }catch(ex){}
      }finally{setLoading(false);}
    }
    init();
  },[]);

  // Notificar admin quando chega cadastro novo
  useEffect(()=>{
    if(!user||user.role!=='admin'||pendentes.length===0)return;
    setNotifs(n=>{
      const jatem=n.find(x=>x.id==='pend');
      if(jatem)return n.map(x=>x.id==='pend'?{...x,msg:`${pendentes.length} cadastro${pendentes.length>1?'s':''} aguardando aprovação`}:x);
      return [{id:'pend',msg:`${pendentes.length} cadastro${pendentes.length>1?'s':''} aguardando aprovação`,tipo:'cadastro'},...n].slice(0,8);
    });
  },[pendentes.length,user]);

  // Alertas
  useEffect(()=>{
    if(!user||!alertCfg.ativo)return;
    const check=()=>{
      const ns=[];
      pedidos.forEach(p=>{
        const s=calcStatus(p);
        const ok=(alertCfg.escopo==='ambos'&&(s==='atrasado'||s==='atencao'))||(alertCfg.escopo==='atrasados'&&s==='atrasado')||(alertCfg.escopo==='risco'&&s==='atencao');
        if(ok)ns.push({id:Math.random(),msg:`${p.id} · ${p.cliente}`,tipo:s});
      });
      // Notificar admins sobre cadastros pendentes
      if(user.role==='admin'&&pendentes.length>0){
        ns.push({id:'pend',msg:`${pendentes.length} cadastro${pendentes.length>1?'s':''} aguardando aprovação`,tipo:'cadastro'});
      }
      if(ns.length)setNotifs(n=>[...ns.slice(0,3),...n].slice(0,8));
    };
    check();
    const t=setInterval(check,alertCfg.intervalo*60000);
    return()=>clearInterval(t);
  },[user,alertCfg,pedidos]);

  if(loading)return e('div',{style:{
    minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
    background:'var(--bg)',gap:16
  }},
    e('div',{style:{display:'flex',alignItems:'center',gap:12}},
      e('img',{src:LOGO_DATA_URI,style:{width:44,height:44,borderRadius:10,objectFit:'contain',background:'#fff',padding:2}}),
      e('div',{style:{fontWeight:700,fontSize:18}},'Econstrução Prática')
    ),
    e('div',{style:{color:'var(--muted)',fontSize:13}},'Carregando...')
  );

  // Wrapper: salva no Supabase automaticamente quando pedidos mudam
  const setPedidosDB=async(updater)=>{
    setPedidos(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      // Salvar no Supabase em background (não bloqueia UI)
      next.forEach(p=>{
        const old=prev.find(x=>x.id===p.id);
        if(!old||JSON.stringify(old)!==JSON.stringify(p)){
          db.savePedido(p).catch(console.error);
        }
      });
      return next;
    });
  };

  if(!user)return e(LoginFlow,{users,setUsers,pendentes,setPendentes,onLogin:(u)=>{
    try{localStorage.setItem('orderly_session',JSON.stringify({email:u.email,senha:u.senha}));}catch(ex){}
    setUser(u);setPag('dashboard');
  }});
  return e(Shell,{user,pedidos,setPedidos:setPedidosDB,users,setUsers,pendentes,setPendentes,pag,setPag,alertCfg,setAlertCfg,notifs,setNotifs,onLogout:()=>{
    try{localStorage.removeItem('orderly_session');}catch(ex){}
    setUser(null);
  }});
}

// ── CAMPO DE INPUT GLOBAL (fora de qualquer função para não perder foco) ──
function FormField({lbl,type,value,onChange,ph,endBtn}){
  return e('div',{style:{marginBottom:14}},

    e('div',{style:{position:'relative'}},
      e('input',{
        className:'form-input',type:type||'text',value,placeholder:ph||'',
        onChange,
        style:{paddingRight:endBtn?44:14}
      }),
      endBtn&&e('button',{
        onClick:endBtn.onClick,
        type:'button',
        style:{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--muted)',display:'flex',cursor:'pointer'}
      },endBtn.icon)
    )

}

// ── LOGIN ─────────────────────────────────────────────
function LoginFlow({users,setUsers,pendentes,setPendentes,onLogin}){
  const [tela,setTela]=useState('login');
  const [email,setEmail]=useState('');
  const [senha,setSenha]=useState('');
  const [nome,setNome]=useState('');
  const [funcao,setFuncao]=useState('');
  const [whatsapp,setWhatsapp]=useState('');
  const [conf,setConf]=useState('');
  const [emailR,setEmailR]=useState('');
  const [cod,setCod]=useState('');
  const [novaSenha,setNovaSenha]=useState('');
  const [novaConf,setNovaConf]=useState('');
  const [showPwd,setShowPwd]=useState(false);
  const [err,setErr]=useState('');
  const [msg,setMsg]=useState('');
  const [codG,setCodG]=useState('');
  const re=()=>{setErr('');setMsg('');};

  const doLogin=async()=>{
    re();
    try{
      // Tentar pelo Supabase primeiro
      const{data,error}=await sb.from('usuarios').select('*').eq('email',email.trim().toLowerCase()).single();
      if(!error&&data){
        if(data.senha!==senha){setErr('E-mail ou senha incorretos.');return;}
        if(!data.ativo){setErr('Conta aguardando aprovação de um administrador.');return;}
        onLogin(data);return;
      }
      // Fallback: tentar dados locais
      const u=users.find(x=>x.email===email.trim().toLowerCase()&&x.senha===senha);
      if(!u){setErr('E-mail ou senha incorretos.');return;}
      if(!u.ativo){setErr('Conta aguardando aprovação.');return;}
      onLogin(u);
    }catch(ex){
      console.error('Login erro:',ex);
      // Fallback: dados locais
      const u=users.find(x=>x.email===email.trim().toLowerCase()&&x.senha===senha);
      if(!u){setErr('E-mail ou senha incorretos.');return;}
      if(!u.ativo){setErr('Conta aguardando aprovação.');return;}
      onLogin(u);
    }
  };
  const doCad=async()=>{
    re();
    if(!nome.trim()){setErr('Informe seu nome.');return;}
    if(!funcao.trim()){setErr('Informe sua função.');return;}
    if(!whatsapp.trim()){setErr('Informe seu WhatsApp.');return;}
    if(!email.trim()){setErr('Informe seu e-mail.');return;}
    if(users.find(x=>x.email===email.toLowerCase())||pendentes.find(x=>x.email===email.toLowerCase())){setErr('E-mail já cadastrado ou pendente.');return;}
    const er=validaSenha(senha);if(er){setErr(er);return;}
    if(senha!==conf){setErr('Senhas não conferem.');return;}
    try{
      const novo={email:email.toLowerCase(),senha,nome,funcao,whatsapp,role:'operador',ativo:false};
      await db.addPendente(novo);
      setPendentes(p=>[...p,novo]);
      setTela('aguard');
    }catch{setErr('Erro ao enviar solicitação. Tente novamente.');}
  };
  const doReset=()=>{
    re();
    if(!users.find(x=>x.email===emailR.toLowerCase())){setErr('E-mail não encontrado.');return;}
    const c=String(Math.floor(100000+Math.random()*900000));
    setCodG(c);setMsg(`Código WhatsApp (simulação): ${c}`);setTela('cod');
  };
  const doCod=()=>{re();if(cod!==codG){setErr('Código inválido.');return;}setTela('novaPwd');};
  const doNovaPwd=async()=>{
    re();
    const er=validaSenha(novaSenha);if(er){setErr(er);return;}
    if(novaSenha!==novaConf){setErr('Senhas não conferem.');return;}
    try{
      await db.updateUser(emailR.toLowerCase(),{senha:novaSenha});
      setUsers(u=>u.map(x=>x.email===emailR.toLowerCase()?{...x,senha:novaSenha}:x));
      setMsg('Senha alterada! Faça login.');setTela('login');setEmail(emailR);
    }catch{setErr('Erro ao salvar. Tente novamente.');}
  };

  const ErrBox=()=>err?e('div',{style:{color:'var(--red)',fontSize:13,marginBottom:8,display:'flex',alignItems:'center',gap:5}},e(Ic.warn),' ',err):null;
  const MsgBox=()=>msg?e('div',{style:{background:'var(--yellow-bg)',border:'1px solid var(--yellow-bd)',borderRadius:8,padding:'9px 12px',marginBottom:12,color:'var(--yellow)',fontSize:13}},msg):null;
  const eyeBtn={onClick:()=>setShowPwd(!showPwd),icon:e(Ic.eye,showPwd)};

  return e('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'20px 16px',background:'radial-gradient(ellipse at 20% 10%, #1c1040 0%, var(--bg) 65%)'}},
    e('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:24}},
      e('img',{src:LOGO_DATA_URI,style:{width:48,height:48,borderRadius:12,objectFit:'contain',background:'#fff',padding:3}}),
      e('div',{},e('div',{style:{fontWeight:700,fontSize:18,letterSpacing:'.03em'}},'Econstrução'),e('div',{style:{color:'var(--muted)',fontSize:10,letterSpacing:'.1em'}},'PRÁTICA · OPERAÇÕES'))
    ),
    e('div',{className:'login-card fade-up'},
      tela==='login'&&e(Fragment,{},
        e('div',{style:{fontWeight:700,fontSize:21,marginBottom:2}},'Entrar'),
        e('div',{style:{color:'var(--muted)',fontSize:13,marginBottom:22}},'Acesse sua conta'),
        e(MsgBox),
        e(FormField,{lbl:'E-mail',type:'email',value:email,onChange:ev=>setEmail(ev.target.value),ph:'seu@email.com.br'}),
        e(FormField,{lbl:'Senha',type:showPwd?'text':'password',value:senha,onChange:ev=>setSenha(ev.target.value),ph:'••••••••',endBtn:eyeBtn}),
        e(ErrBox),
        e('button',{className:'btn-primary',onClick:doLogin,style:{marginTop:4}},'Entrar'),
        e('div',{style:{display:'flex',justifyContent:'space-between',marginTop:16}},
          e('button',{onClick:()=>{setTela('cad');re();},style:{background:'none',border:'none',color:'var(--accent2)',fontSize:13,cursor:'pointer'}},'Criar conta'),
          e('button',{onClick:()=>{setTela('reset');re();},style:{background:'none',border:'none',color:'var(--accent2)',fontSize:13,cursor:'pointer'}},'Esqueci a senha')
        )
      ),
      tela==='cad'&&e(Fragment,{},
        e('div',{style:{fontWeight:700,fontSize:20,marginBottom:20}},'Criar conta'),
        e(FormField,{lbl:'Nome completo',value:nome,onChange:ev=>setNome(ev.target.value),ph:'Seu nome'}),
        e(FormField,{lbl:'Função / Cargo',value:funcao,onChange:ev=>setFuncao(ev.target.value),ph:'Ex: Analista de Logística'}),
        e(FormField,{lbl:'WhatsApp',type:'tel',value:whatsapp,onChange:ev=>setWhatsapp(ev.target.value),ph:'(11) 99999-9999'}),
        e(FormField,{lbl:'E-mail',type:'email',value:email,onChange:ev=>setEmail(ev.target.value),ph:'seu@email.com.br'}),
        e(FormField,{lbl:'Senha',type:'password',value:senha,onChange:ev=>setSenha(ev.target.value),ph:'Mín 8 chars, 1 maiúscula, 1 número'}),
        e(FormField,{lbl:'Confirmar senha',type:'password',value:conf,onChange:ev=>setConf(ev.target.value),ph:'Repita'}),
        e('div',{style:{background:'var(--blue-bg)',border:'1px solid var(--blue-bd)',borderRadius:8,padding:'8px 12px',marginBottom:10,fontSize:12,color:'var(--blue)'}},'⚠️ Sua solicitação será revisada pela Juliana ou Produção antes de liberar o acesso.'),
        e(ErrBox),
        e('button',{className:'btn-primary',onClick:doCad},'Solicitar acesso'),
        e('button',{style:{background:'none',border:'none',color:'var(--muted)',fontSize:13,marginTop:12,width:'100%',cursor:'pointer'},onClick:()=>{setTela('login');re();}},'← Voltar ao login')
      ),
      tela==='aguard'&&e('div',{style:{textAlign:'center',padding:'20px 0'}},
        e('div',{style:{fontSize:40,marginBottom:12}},'⏳'),
        e('div',{style:{fontWeight:700,fontSize:18,marginBottom:8}},'Solicitação enviada!'),
        e('div',{style:{color:'var(--muted)',fontSize:13,lineHeight:1.7,marginBottom:10}},'Aguarde a Juliana ou a Produção aprovarem seu cadastro na aba Equipe.'),
        e('div',{style:{background:'var(--green-bg)',border:'1px solid var(--green-bd)',borderRadius:8,padding:'10px 12px',marginBottom:22,fontSize:13,color:'var(--green)'}},'✅ Quando aprovado, você poderá fazer login normalmente.'),
        e('button',{className:'btn-primary',onClick:()=>setTela('login')},'← Voltar ao login')
      ),
      tela==='reset'&&e(Fragment,{},
        e('div',{style:{fontWeight:700,fontSize:20,marginBottom:18}},'Redefinir senha'),
        e(FormField,{lbl:'E-mail cadastrado',type:'email',value:emailR,onChange:ev=>setEmailR(ev.target.value),ph:'seu@email.com.br'}),
        e(ErrBox),
        e('button',{className:'btn-primary',onClick:doReset},'Enviar código WhatsApp'),
        e('button',{style:{background:'none',border:'none',color:'var(--muted)',fontSize:13,marginTop:12,width:'100%',cursor:'pointer'},onClick:()=>{setTela('login');re();}},'← Voltar')
      ),
      tela==='cod'&&e(Fragment,{},
        e('div',{style:{fontWeight:700,fontSize:20,marginBottom:10}},'Código recebido'),
        e(MsgBox),
        e(FormField,{lbl:'Código de 6 dígitos',value:cod,onChange:ev=>setCod(ev.target.value),ph:'000000'}),
        e(ErrBox),
        e('button',{className:'btn-primary',onClick:doCod},'Verificar'),
        e('button',{style:{background:'none',border:'none',color:'var(--muted)',fontSize:13,marginTop:12,width:'100%',cursor:'pointer'},onClick:()=>{setTela('reset');re();}},'← Reenviar código')
      ),
      tela==='novaPwd'&&e(Fragment,{},
        e('div',{style:{fontWeight:700,fontSize:20,marginBottom:18}},'Nova senha'),
        e(FormField,{lbl:'Nova senha',type:'password',value:novaSenha,onChange:ev=>setNovaSenha(ev.target.value),ph:'Mín 8 chars, 1 maiúscula, 1 número'}),
        e(FormField,{lbl:'Confirmar',type:'password',value:novaConf,onChange:ev=>setNovaConf(ev.target.value),ph:'Repita'}),
        e('div',{style:{fontSize:11,color:'var(--muted)',marginBottom:10}},'🔐 Mín. 8 · 1 maiúscula · 1 minúscula · 1 número'),
        e(ErrBox),
        e('button',{className:'btn-primary',onClick:doNovaPwd},'Salvar nova senha')
      )
    )
  );
}

// ── SHELL ─────────────────────────────────────────────
function Shell({user,pedidos,setPedidos,users,setUsers,pendentes,setPendentes,pag,setPag,alertCfg,setAlertCfg,notifs,setNotifs,onLogout}){
  const [pedAberto,setPedAberto]=useState(null);
  const [showNovo,setShowNovo]=useState(false);
  const [showNotifs,setShowNotifs]=useState(false);
  const isAdmin=user.role==='admin';
  const pendCount=pendentes.length;
  const notifsN=notifs.length;

  const NAV=[
    {id:'dashboard',lbl:'Início',Ic:Ic.home},
    {id:'pedidos',lbl:'Pedidos',Ic:Ic.box},
    {id:'calendario',lbl:'Agenda',Ic:Ic.cal},
    ...(isAdmin?[{id:'usuarios',lbl:'Equipe',Ic:Ic.users,badge:pendCount}]:[]),
    {id:'relatorio',lbl:'Relatório',Ic:Ic.rel},
    {id:'config',lbl:'Config',Ic:Ic.cog},
  ];

  const avatar=e('div',{style:{width:28,height:28,borderRadius:7,background:'var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:13,flexShrink:0}},user.nome[0].toUpperCase());

  const renderPag=()=>{
    if(pag==='dashboard')return e(Dashboard,{pedidos,onAbrir:setPedAberto,user});
    if(pag==='calendario')return e(Calendario,{pedidos,onAbrir:setPedAberto});

// ── DASHBOARD ─────────────────────────────────────────
function Dashboard({pedidos,onAbrir,user}){
  const isAdminDash=user&&user.role==='admin';
  const hoje=new Date();
  const [expanded,setExpanded]=useState(null); // 'atrasados'|'risco'|'entregues'|null
  const ativos=pedidos.filter(p=>p.etapa!=='Entregue');
  const listEntregues=[...pedidos.filter(p=>p.etapa==='Entregue')].sort((a,b)=>new Date(b.ultimaAt)-new Date(a.ultimaAt));
  const listAtrasados=[...ativos.filter(p=>calcStatus(p)==='atrasado')].sort((a,b)=>diasDiff(a.entrega)-diasDiff(b.entrega));
  const listRisco=[...ativos.filter(p=>calcStatus(p)==='atencao')].sort((a,b)=>diasDiff(a.entrega)-diasDiff(b.entrega));
  const listNoPrazo=ativos.filter(p=>calcStatus(p)==='proximo');
  const perf=pedidos.length?Math.round(((listEntregues.length+listNoPrazo.length)/pedidos.length)*100):0;
  const pipeline=[
    {nome:'Recebido',val:pedidos.filter(p=>p.etapa==='Recebido').length,cor:'var(--blue)'},
    {nome:'Produção',val:pedidos.filter(p=>p.etapa==='Produção').length,cor:'var(--accent2)'},
    {nome:'Expedição',val:pedidos.filter(p=>p.etapa==='Expedição').length,cor:'var(--yellow)'},
    {nome:'Entregue',val:listEntregues.length,cor:'var(--green)'},
  ];
  const maxP=Math.max(...pipeline.map(x=>x.val),1);

  // Gráfico mensal
  const MESES_ABR=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const mesesData=[];
  for(let i=5;i>=0;i--){
    const d=new Date(hoje.getFullYear(),hoje.getMonth()-i,1);
    const mes=d.getMonth();const ano=d.getFullYear();
    const entMes=pedidos.filter(p=>{
      if(!p.entrega)return false;
      const de=new Date(p.entrega+'T12:00:00');
      return de.getMonth()===mes&&de.getFullYear()===ano;
    });
    mesesData.push({
      lbl:MESES_ABR[mes],total:entMes.length,
      entregues:entMes.filter(p=>p.etapa==='Entregue').length,
      atrasados:entMes.filter(p=>calcStatus(p)==='atrasado').length,
      noprazo:entMes.filter(p=>calcStatus(p)==='proximo').length,
    });
  }
  const maxBar=Math.max(...mesesData.map(m=>m.total),1);

  // Listas expandíveis por KPI
  const listaExpanded={
    atrasados:listAtrasados,risco:listRisco,entregues:listEntregues,noprazo:listNoPrazo
  }[expanded]||[];

  const KpiCard=({id,lbl,sub,v,cor,icon})=>e('div',{
    onClick:()=>setExpanded(expanded===id?null:id),
    style:{
      background:expanded===id?cor+'18':'var(--card)',
      border:`1px solid ${expanded===id?cor:cor+'33'}`,
      borderRadius:14,padding:'14px 16px',cursor:'pointer',
      transition:'all .2s',flex:1,position:'relative',overflow:'hidden'
    }
  },
    e('div',{style:{position:'absolute',top:0,left:0,bottom:0,width:3,background:cor,borderRadius:'14px 0 0 14px'}}),
    e('div',{style:{paddingLeft:6}},
      e('div',{style:{fontSize:9,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}},lbl),
      e('div',{style:{fontSize:30,fontWeight:800,color:cor,lineHeight:1,marginBottom:2}},v),
      sub&&e('div',{style:{fontSize:10,color:'var(--muted)'}},sub),
      e('div',{style:{position:'absolute',top:10,right:12,fontSize:20,opacity:.15}},icon)
    )
  );

  const PedCard=({p,cor,badge})=>{
    const etq=etqDias(p.entrega);
    return e('div',{onClick:()=>onAbrir(p.id),style:{
      background:'var(--card)',border:`1px solid ${cor}33`,borderLeft:`3px solid ${cor}`,
      borderRadius:12,padding:'12px 14px',cursor:'pointer',display:'flex',
      justifyContent:'space-between',alignItems:'center',gap:10
    }},
      e('div',{style:{flex:1,minWidth:0}},
        e('div',{style:{display:'flex',alignItems:'center',gap:7,marginBottom:3}},
          e('span',{style:{fontWeight:700,fontSize:13,fontFamily:'DM Mono,monospace'}},p.id),
          e('span',{style:{background:cor+'22',color:cor,borderRadius:5,fontSize:10,padding:'1px 6px',fontWeight:700,flexShrink:0}},badge||etq.txt)
        ),
        e('div',{style:{fontWeight:600,fontSize:13,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.cliente),
        e('div',{style:{fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},

        )
      ),
      e('div',{style:{flexShrink:0,textAlign:'right'}},
        e('div',{style:{fontSize:11,color:cor,fontWeight:700}},fmtD(p.entrega)),
        e('div',{style:{fontSize:10,color:'var(--muted)'}},p.etapa)
      )
    );
  };

  return e('div',{className:'fade-up'},
    e('div',{className:'page-label'},'VISÃO EXECUTIVA'),
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}},
      e('h1',{className:'page-title'},'Dashboard'),
      e('div',{style:{fontSize:11,color:'var(--muted)',background:'var(--card)',border:'1px solid var(--border2)',borderRadius:7,padding:'4px 10px'}},hoje.toLocaleDateString('pt-BR'))
    ),

    // ── KPIs clicáveis ──
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:14}},
      e(KpiCard,{id:'atrasados',lbl:'Atrasados',v:listAtrasados.length,cor:'var(--red)',icon:'⏰',sub:listAtrasados.length?'Toque para ver':'Tudo ok'}),
      e(KpiCard,{id:'risco',lbl:'Em risco',v:listRisco.length,cor:'var(--yellow)',icon:'⚠️',sub:listRisco.length?'Toque para ver':'Tudo ok'}),
      e(KpiCard,{id:'entregues',lbl:'Entregues',v:listEntregues.length,cor:'var(--green)',icon:'✓',sub:'Toque para ver'}),
      e(KpiCard,{id:'noprazo',lbl:'No prazo',v:listNoPrazo.length,cor:'var(--blue)',icon:'📋',sub:'Toque para ver'})
    ),

    // ── LISTA EXPANDIDA ──
    expanded&&e('div',{style:{marginBottom:14}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        e('div',{style:{fontWeight:700,fontSize:14}},{atrasados:'Pedidos Atrasados',risco:'Em Risco',entregues:'Entregues',noplazo:'No Prazo'}[expanded]||expanded),
        e('button',{onClick:()=>setExpanded(null),style:{background:'var(--border)',border:'none',color:'var(--muted)',borderRadius:7,padding:'4px 10px',fontSize:12,cursor:'pointer'}},'Fechar')
      ),
      listaExpanded.length===0
        ?e('div',{style:{textAlign:'center',padding:'24px',color:'var(--muted)',fontSize:13}},'Nenhum pedido aqui 👌')
        :e('div',{style:{display:'flex',flexDirection:'column',gap:8}},
            listaExpanded.map(p=>{
              const s=calcStatus(p);
              const cor=corS(s);
              const badge=s==='atrasado'?Math.abs(diasDiff(p.entrega))+'d atraso':etqDias(p.entrega).txt;
              return e(PedCard,{key:p.id,p,cor,badge});
            })
          )
    ),

    // ── PERFORMANCE ──
    e('div',{className:'card',style:{marginBottom:14}},
      e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        e('div',{style:{fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em'}},'PERFORMANCE'),
        e('div',{style:{fontWeight:800,fontSize:22,color:perf>=80?'var(--green)':perf>=60?'var(--yellow)':'var(--red)'}},perf+'%')
      ),
      // Barra de progresso segmentada
      e('div',{style:{height:10,background:'var(--border2)',borderRadius:99,overflow:'hidden',display:'flex',gap:1,marginBottom:8}},
        listEntregues.length>0&&e('div',{style:{flex:listEntregues.length,background:'var(--green)',borderRadius:'99px 0 0 99px'}}),
        listNoPrazo.length>0&&e('div',{style:{flex:listNoPrazo.length,background:'var(--blue)'}}),
        listRisco.length>0&&e('div',{style:{flex:listRisco.length,background:'var(--yellow)'}}),
        listAtrasados.length>0&&e('div',{style:{flex:listAtrasados.length,background:'var(--red)',borderRadius:'0 99px 99px 0'}})
      ),
      e('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px 14px',fontSize:11}},
        [{lbl:'Entregues',v:listEntregues.length,c:'var(--green)'},{lbl:'No prazo',v:listNoPrazo.length,c:'var(--blue)'},{lbl:'Em risco',v:listRisco.length,c:'var(--yellow)'},{lbl:'Atrasados',v:listAtrasados.length,c:'var(--red)'}]

          e('span',{style:{color:'var(--muted)'}},v+' '+lbl)
        ))
      )
    ),

    // ── GRÁFICO ENTREGAS POR MÊS ──
    e('div',{className:'card',style:{marginBottom:14}},
      e('div',{style:{fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.07em',marginBottom:14}},'ENTREGAS POR MÊS'),
      e('div',{style:{display:'flex',alignItems:'flex-end',gap:8,height:110}},
        mesesData.map((m,i)=>{
          const hEnt=m.entregues?Math.round((m.entregues/maxBar)*80):0;
          const hAtr=m.atrasados?Math.round((m.atrasados/maxBar)*80):0;
          const isAtual=i===mesesData.length-1;
          return e('div',{key:i,style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:0}},
            e('div',{style:{fontSize:10,fontWeight:700,color:'var(--muted)',marginBottom:4}},m.total||''),
            e('div',{style:{width:'100%',height:80,display:'flex',flexDirection:'column',justifyContent:'flex-end',borderRadius:6,overflow:'hidden',background:'var(--border)22'}},
              hAtr>0&&e('div',{style:{width:'100%',height:hAtr,background:`linear-gradient(180deg,#f43f5e,#be123c)`,flexShrink:0}}),
              hEnt>0&&e('div',{style:{width:'100%',height:hEnt,background:isAtual?'linear-gradient(180deg,#22c55e,#16a34a)':'linear-gradient(180deg,#22c55e99,#16a34a99)',flexShrink:0}})
            ),
            e('div',{style:{fontSize:10,color:isAtual?'var(--text)':'var(--muted)',fontWeight:isAtual?700:400,marginTop:5}},m.lbl)

        [{c:'var(--green)',lbl:'Entregues'},{c:'var(--red)',lbl:'Atrasados'}].map(({c,lbl})=>
          e('div',{key:lbl,style:{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'var(--muted)'}},

    e('div',{className:'card',style:{marginBottom:14}},

// ── CALENDÁRIO ────────────────────────────────────────
function Calendario({pedidos,onAbrir}){
  const [mes,setMes]=useState(4);const [ano,setAno]=useState(2026);
  const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const DIAS=['D','S','T','Q','Q','S','S'];
  const prim=new Date(ano,mes,1).getDay();
  const diasN=new Date(ano,mes+1,0).getDate();
  const pedDia={};
  pedidos.forEach(p=>{
    const d=new Date(p.entrega+'T12:00:00');
    if(d.getMonth()===mes&&d.getFullYear()===ano){
      const k=d.getDate();if(!pedDia[k])pedDia[k]=[];pedDia[k].push(p);
    }
  });
  const cells=[];
  for(let i=0;i<prim;i++)cells.push(null);
  for(let d=1;d<=diasN;d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);
  const semanas=[];for(let i=0;i<cells.length;i+=7)semanas.push(cells.slice(i,i+7));

  return e('div',{className:'fade-up'},
    e('div',{className:'page-label'},'AGENDA OPERACIONAL'),
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      e('h1',{className:'page-title'},MESES[mes]+' '+ano),
      e('div',{style:{display:'flex',gap:6}},
        e('button',{onClick:()=>{mes===0?(setMes(11),setAno(a=>a-1)):setMes(m=>m-1);},style:{background:'var(--card)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',display:'flex'}},Ic.arr(true)),
        e('button',{onClick:()=>{mes===11?(setMes(0),setAno(a=>a+1)):setMes(m=>m+1);},style:{background:'var(--card)',border:'1px solid var(--border2)',borderRadius:8,padding:'7px 10px',color:'var(--text)',display:'flex'}},Ic.arr(false))
      )
    ),
    e('div',{className:'card',style:{padding:0,overflow:'hidden'}},
      e('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',borderBottom:'1px solid var(--border)'}},
        DIAS.map(d=>e('div',{key:d,style:{padding:'8px 4px',textAlign:'center',fontSize:10,fontWeight:600,color:'var(--muted)',letterSpacing:'.07em'}},d))
      ),
      semanas.map((sem,si)=>e('div',{key:si,style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',borderBottom:si<semanas.length-1?'1px solid var(--border)':'none'}},
        sem.map((dia,di)=>{
          const isH=dia===16&&mes===4&&ano===2026;
          const ps=dia?pedDia[dia]||[]:[];
          return e('div',{key:di,className:'cal-cell',style:{borderLeft:di>0?'1px solid var(--border)':'none',background:isH?'#7c6af710':'transparent'}},
            dia&&e(Fragment,{},
              e('div',{style:{display:'inline-flex',width:18,height:18,borderRadius:99,fontSize:11,alignItems:'center',justifyContent:'center',fontWeight:isH?700:400,background:isH?'var(--accent)':'transparent',color:isH?'#fff':'var(--muted)',marginBottom:3}},dia),
              ps.slice(0,1).map(p=>{
                const s=calcStatus(p);
                return e('div',{key:p.id,onClick:()=>onAbrir(p.id),style:{fontSize:9,background:bgS(s),border:`1px solid ${bdS(s)}`,borderLeft:`2px solid ${corS(s)}`,borderRadius:3,padding:'2px 5px',cursor:'pointer',overflow:'hidden',color:corS(s)}},
                  e('div',{style:{fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},p.id),
                  e('div',{style:{color:'var(--muted)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',marginTop:1}},p.cliente)
                );
              }),
              ps.length>1&&e('div',{style:{fontSize:9,color:'var(--muted)',marginTop:1}},`+${ps.length-1}`)
            )
          );
        })
      ))
    )
  );
}

// ── PEDIDOS ───────────────────────────────────────────
function Pedidos({pedidos,setPedidos,user,onAbrir,onNovo}){
  const isAdmin=user.role==='admin';
  const [filtro,setFiltro]=useState('todos');
  const [vendFiltro,setVendFiltro]=useState('todos');
  const FLT=[{id:'todos',lbl:'Todos'},{id:'atrasado',lbl:'Atrasados'},{id:'atencao',lbl:'Atenção'},{id:'proximo',lbl:'Próximos'},{id:'producao',lbl:'Produção'},{id:'confirmado',lbl:'Entregues'}];
  const vendedores=[...new Set(pedidos.map(p=>p.vendedor).filter(Boolean))].sort();
  const lista=pedidos.filter(p=>{
    const okStatus=filtro==='todos'?true:filtro==='producao'?p.etapa==='Produção':calcStatus(p)===filtro;
    const okVend=vendFiltro==='todos'||p.vendedor===vendFiltro;
    return okStatus&&okVend;

function ModalPedido({pedido,user,pedidos,setPedidos,onClose}){
  const fileRef=useRef();const [fotoTipo,setFotoTipo]=useState(null);
  const [obsEdit,setObsEdit]=useState(false);
  const [obsVal,setObsVal]=useState(pedido?pedido.obs||'':'');
  if(!pedido)return null;
  const s=calcStatus(pedido);const etq=etqDias(pedido.entrega);
  const ETAPAS=['Recebido','Produção','Expedição','Entregue'];
  const idx=ETAPAS.indexOf(pedido.etapa);const cor=corS(s);
  // ciclo: dias entre pedido e entrega confirmada (ou hoje)
  const dPedido=pedido.dataPedido?new Date(pedido.dataPedido+'T12:00:00'):null;
  const dEntrega=pedido.etapa==='Entregue'?new Date(pedido.ultimaAt+'T12:00:00'):HOJE;

  const salvarObs=()=>{
    setPedidos(ps=>ps.map(p=>p.id===pedido.id?{...p,obs:obsVal,hist:[...p.hist,{d:agora(),m:'Observação atualizada',u:user.nome}],ultimaAt:new Date().toISOString().split('T')[0]}:p));
    setObsEdit(false);
  };
  const upFoto=(tipo)=>{setFotoTipo(tipo);fileRef.current.click();};
  const onFile=(ev)=>{
    const f=ev.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async(x)=>{
      const dataUrl=x.target.result;

        urlFinal=await db.uploadFoto(pedido.id,fotoTipo,dataUrl);

      if(fotoTipo==='ent'){
        const nfVal=prompt('Informe o número da NF para este pedido:','NF-');

      } else {
        setPedidos(ps=>ps.map(p=>p.id===pedido.id?{...p,fotoP:urlFinal,hist:[...p.hist,{d:agora(),m:'Foto de produção anexada',u:user.nome}],ultimaAt:new Date().toISOString().split('T')[0]}:p));
      }
    };
    r.readAsDataURL(f);ev.target.value='';
  };
  const confirmar=()=>{
    setPedidos(ps=>ps.map(p=>p.id===pedido.id?{...p,etapa:'Entregue',hist:[...p.hist,{d:agora(),m:'Entrega confirmada ✓',u:user.nome}],ultimaAt:new Date().toISOString().split('T')[0]}:p));
    onClose();
  };
  const marcarRisco=()=>{
    setPedidos(ps=>ps.map(p=>p.id===pedido.id?{...p,hist:[...p.hist,{d:agora(),m:'Marcado em risco',u:user.nome}],ultimaAt:new Date().toISOString().split('T')[0]}:p));
  };

  return e('div',{className:'modal-overlay',onClick:ev=>{if(ev.target===ev.currentTarget)onClose();}},
    e('input',{type:'file',accept:'image/*',ref:fileRef,style:{display:'none'},onChange:onFile}),
    e('div',{className:'modal-box'},
      e('div',{style:{padding:'18px 18px 14px',borderBottom:'1px solid var(--border)',background:`linear-gradient(135deg,${cor}10,transparent)`}},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
          e('div',{},
            e('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:2}},
              e('div',{style:{fontWeight:700,fontSize:19}},pedido.id),
              pedido.fotoE&&pedido.nf&&pedido.nf!=='—'&&e('div',{style:{fontSize:11,color:'var(--muted)',background:'var(--border)',borderRadius:5,padding:'2px 8px',fontFamily:'DM Mono, monospace'}},pedido.nf)
            ),
            e('div',{style:{fontWeight:600,fontSize:14,marginBottom:2}},pedido.cliente),
            pedido.vendedor&&user.role==='admin'&&e('div',{style:{color:'var(--muted)',fontSize:12}},'👤 '+pedido.vendedor),
            pedido.areaEntrega&&e('div',{style:{color:'var(--muted)',fontSize:12}},'📍 '+pedido.areaEntrega),
            pedido.produto&&e('div',{style:{color:'var(--muted)',fontSize:12}},pedido.produto+(pedido.quantidade?' · '+pedido.quantidade:''))
          ),
          e('button',{onClick:onClose,style:{background:'var(--surface)',border:'1px solid var(--border2)',borderRadius:8,padding:'6px',display:'flex',color:'var(--muted)'}},e(Ic.x))
        ),
        e('div',{style:{display:'flex',gap:7,marginTop:10}},
          e('span',{className:'badge',style:{background:bgS(s),border:`1px solid ${bdS(s)}`,color:cor}},lblS(s)),

// ── MODAL NOVO PEDIDO ─────────────────────────────────
function ModalNovoPedido({pedidos,setPedidos,user,onClose}){
  const [f,setF]=useState({cliente:'',dataPedido:'',entrega:'',vendedor:'',produto:'',quantidade:'',areaEntrega:'',etapa:'Recebido'});
  const [err,setErr]=useState('');
  const [ocrLoad,setOcrLoad]=useState(false);
  const [fotoPedido,setFotoPedido]=useState(null);
  const ocrRef=useRef();
  const fld=(k,v)=>setF(x=>({...x,[k]:v}));
  const nextId=()=>`PED-${Math.max(...pedidos.map(p=>parseInt(p.id.replace('PED-',''))||0))+1}`;

  // Processar imagem ou PDF
  const processarImagem=async(blob)=>{
    setOcrLoad(true);setErr('');
    const isPDF=blob.type==='application/pdf';
    const reader=new FileReader();
    reader.onload=async(x)=>{
      const dataUrl=x.target.result;
      // Para PDF mostramos ícone; para imagem mostramos preview
      setFotoPedido(isPDF?'__pdf__':dataUrl);
      const b64=dataUrl.split(',')[1];
      const PROMPT='Analise este pedido de venda e extraia os dados em JSON puro sem markdown. Retorne APENAS o JSON com estes campos: {"numeroPedido":"","cliente":"","dataPedido":"YYYY-MM-DD","dataEntrega":"YYYY-MM-DD","vendedor":"","produto":"descricao do produto principal","quantidade":"","areaEntrega":"municipio ou area"}';
      // Montar content diferente para PDF vs imagem
      const content=isPDF
        ?[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:PROMPT}]
        :[{type:'image',source:{type:'base64',media_type:blob.type||'image/jpeg',data:b64}},{type:'text',text:PROMPT}];
      try{
        const resp=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'anthropic-dangerous-allow-browser':'true'
          },
          body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content}]})
        });
        const data=await resp.json();
        const txt=data.content?.[0]?.text||'{}';
        const clean=txt.replace(/```json|```/g,'').trim();
        const parsed=JSON.parse(clean);
        setF(prev=>({
          ...prev,
          cliente:parsed.cliente||prev.cliente,
          dataPedido:parsed.dataPedido||prev.dataPedido,
          entrega:parsed.dataEntrega||prev.entrega,
          vendedor:parsed.vendedor||prev.vendedor,
          produto:parsed.produto||prev.produto,
          quantidade:String(parsed.quantidade||prev.quantidade),
          areaEntrega:parsed.areaEntrega||prev.areaEntrega,
        }));
      }catch(ex){
        setErr('Erro ao ler o pedido. Preencha manualmente.');
        console.error(ex);
      }finally{setOcrLoad(false);}
    };
    reader.readAsDataURL(blob);
  };

  const handleOCR=async(ev)=>{
    const file=ev.target.files[0];if(!file)return;
    ev.target.value='';
    processarImagem(file);
  };

  // Paste via Ctrl+V
  const handlePaste=useRef(null);
  useEffect(()=>{
    const fn=(ev)=>{
      const items=ev.clipboardData?.items;
      if(!items)return;
      for(const item of items){
        if(item.type.startsWith('image/')){
          ev.preventDefault();
          const blob=item.getAsFile();
          if(blob)processarImagem(blob);
          break;
        }
      }
    };
    document.addEventListener('paste',fn);
    return()=>document.removeEventListener('paste',fn);
  },[]);

  const salvar=async()=>{
    if(!f.cliente.trim()){setErr('Informe o cliente.');return;}
    if(!f.entrega){setErr('Informe a data de entrega.');return;}
    if(!f.vendedor.trim()){setErr('Informe o vendedor.');return;}
    const novoPed={
      id:nextId(),nf:'',cliente:f.cliente,dataPedido:f.dataPedido,entrega:f.entrega,
      vendedor:f.vendedor,produto:f.produto,quantidade:f.quantidade,areaEntrega:f.areaEntrega,
      etapa:f.etapa,ultimaAt:new Date().toISOString().split('T')[0],obs:'',
      hist:[{d:agora(),m:'Pedido criado'+(fotoPedido?' via foto':''),u:user.nome}],
      fotoPedido:fotoPedido,fotoP:null,fotoE:null
    };
    await db.savePedido(novoPed).catch(console.error);
    setPedidos(ps=>[...ps,novoPed]);
    onClose();
  };

  const Campo=({lbl,fk,type,ph})=>e('div',{style:{marginBottom:10}},
    e('label',{style:{display:'block',fontSize:10,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:5}},lbl),
    e('input',{className:'form-input',type:type||'text',value:f[fk],placeholder:ph||'',onChange:ev=>fld(fk,ev.target.value),style:{fontSize:13}})
  );

  return e('div',{className:'modal-overlay',onClick:ev=>{if(ev.target===ev.currentTarget)onClose();}},
    e('input',{type:'file',accept:'image/*,application/pdf',ref:ocrRef,style:{display:'none'},onChange:handleOCR}),

function Usuarios({users,setUsers,pendentes,setPendentes}){
  const aprovar=async(u)=>{
    try{
      await db.addUser({...u,ativo:true});
      await db.deletePendente(u.email);
      setUsers(us=>[...us,{...u,ativo:true}]);
      setPendentes(p=>p.filter(x=>x.email!==u.email));
    }catch(err){console.error('Erro ao aprovar:',err);}
  };
  const rejeitar=async(u)=>{
    try{
      await db.deletePendente(u.email);
      setPendentes(p=>p.filter(x=>x.email!==u.email));
    }catch(err){console.error('Erro ao rejeitar:',err);}
  };
  const toggle=async(email)=>{
    const u=users.find(x=>x.email===email);
    if(!u)return;
    try{
      await db.updateUser(email,{ativo:!u.ativo});
      setUsers(us=>us.map(x=>x.email===email?{...x,ativo:!x.ativo}:x));
    }catch(err){console.error('Erro ao alterar status:',err);}
  };

  return e('div',{className:'fade-up'},
    e('div',{className:'page-label'},'ADMINISTRAÇÃO'),
    e('h1',{className:'page-title',style:{marginBottom:18}},'Equipe'),
    pendentes.length>0&&e('div',{style:{marginBottom:22}},

// ── RELATÓRIO ────────────────────────────────────────
function Relatorio({pedidos,user}){
  const isAdmin=user&&user.role==='admin';
  const [periodo,setPeriodo]=useState('mes');
  const [vendFiltro,setVendFiltro]=useState('todos');
  const vendedores=[...new Set(pedidos.map(p=>p.vendedor).filter(Boolean))].sort();

  const filtrados=pedidos.filter(p=>{
    const okV=vendFiltro==='todos'||p.vendedor===vendFiltro;
    return okV;
  });

  const entregues=filtrados.filter(p=>p.etapa==='Entregue');
  const atrasados=filtrados.filter(p=>calcStatus(p)==='atrasado');
  const emRisco=filtrados.filter(p=>calcStatus(p)==='atencao');
  const ativos=filtrados.filter(p=>p.etapa!=='Entregue');

  // ciclo médio
  const ciclos=entregues.map(p=>{
    if(!p.dataPedido||!p.ultimaAt)return null;
    const d=Math.round((new Date(p.ultimaAt+'T12:00:00')-new Date(p.dataPedido+'T12:00:00'))/86400000);
    return d>=0?d:null;
  }).filter(x=>x!==null);
  const cicloMedio=ciclos.length?Math.round(ciclos.reduce((a,b)=>a+b,0)/ciclos.length):null;
  const perf=filtrados.length?Math.round(((entregues.length+filtrados.filter(p=>calcStatus(p)==='proximo').length)/filtrados.length)*100):0;

  // exportar CSV
  const exportarCSV=()=>{
    const header='Pedido,Cliente,Vendedor,Data Pedido,Data Entrega,Etapa,Status,Dias Ciclo,Observação';
    const rows=filtrados.map(p=>{
      const s=lblS(calcStatus(p));
      const ciclo=p.dataPedido&&p.ultimaAt?Math.round((new Date(p.ultimaAt+'T12:00:00')-new Date(p.dataPedido+'T12:00:00'))/86400000):'';
      return[p.id,p.cliente,p.vendedor||'',fmtD(p.dataPedido),fmtD(p.entrega),p.etapa,s,ciclo,p.obs||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',');
    });
    const csv=[header,...rows].join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);
    a.download='orderly-relatorio.csv';a.click();
  };

  const KP=({lbl,val,sub,cor})=>e('div',{className:'card',style:{borderLeft:`3px solid ${cor||'var(--accent)'}`,padding:'12px 14px'}},
    e('div',{style:{fontSize:9,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4}},lbl),
    e('div',{style:{fontSize:26,fontWeight:700,color:cor||'var(--text)',lineHeight:1}},val),
    sub&&e('div',{style:{fontSize:11,color:'var(--muted)',marginTop:3}},sub)
  );

  return e('div',{className:'fade-up'},
    e('div',{className:'page-label'},'ANÁLISE'),
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      e('h1',{className:'page-title'},'Relatório'),
      e('button',{onClick:exportarCSV,style:{background:'var(--green)',color:'#fff',border:'none',borderRadius:9,padding:'9px 16px',fontWeight:700,fontSize:13,display:'flex',alignItems:'center',gap:6}},
        e(Ic.rel),'Exportar CSV'
      )
    ),
    // Filtro vendedor — só admins
    isAdmin&&e('div',{className:'filters-row',style:{marginBottom:16}},
      e('button',{className:`filter-btn${vendFiltro==='todos'?' active':''}`,onClick:()=>setVendFiltro('todos')},'👤 Todos'),
      vendedores.map(v=>e('button',{key:v,className:`filter-btn${vendFiltro===v?' active':''}`,onClick:()=>setVendFiltro(v)},v))
    ),
    // KPIs
    e('div',{style:{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:14}},
      e(KP,{lbl:'Total de pedidos',val:filtrados.length,cor:'var(--blue)'}),
      e(KP,{lbl:'Entregues',val:entregues.length,sub:`${perf}% no prazo`,cor:'var(--green)'}),
      e(KP,{lbl:'Atrasados',val:atrasados.length,cor:'var(--red)'}),
      e(KP,{lbl:'Ciclo médio',val:cicloMedio!==null?cicloMedio+'d':'—',sub:'pedido → entrega',cor:'var(--accent2)'})
    ),
    // Tabela de pedidos
    e('div',{className:'card',style:{padding:0,overflow:'hidden'}},
      e('div',{style:{padding:'14px 16px',borderBottom:'1px solid var(--border)',fontWeight:700,fontSize:13}},'Detalhamento'),
      e('div',{style:{overflowX:'auto'}},
        e('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:12}},
          e('thead',{},
            e('tr',{style:{background:'var(--surface)'}},
              (isAdmin?['Pedido','Cliente','Vendedor','Pedido','Entrega','Etapa','Status','Ciclo','Obs']:['Pedido','Cliente','Pedido','Entrega','Etapa','Status','Ciclo','Obs']).map(h=>
                e('th',{key:h,style:{padding:'10px 12px',textAlign:'left',fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em',whiteSpace:'nowrap'}},h)
              )
            )
          ),
          e('tbody',{},
            filtrados.sort((a,b)=>new Date(a.entrega)-new Date(b.entrega)).map((p,i)=>{
              const s=calcStatus(p);
              const ciclo=p.dataPedido&&p.ultimaAt?Math.round((new Date(p.ultimaAt+'T12:00:00')-new Date(p.dataPedido+'T12:00:00'))/86400000):null;
              return e('tr',{key:p.id,style:{borderBottom:'1px solid var(--border)',background:i%2===0?'transparent':'#ffffff04'}},
                e('td',{style:{padding:'9px 12px',fontWeight:700,fontFamily:'DM Mono,monospace',whiteSpace:'nowrap'}},p.id),
                e('td',{style:{padding:'9px 12px',maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.cliente),
                isAdmin&&e('td',{style:{padding:'9px 12px',color:'var(--muted)',whiteSpace:'nowrap'}},p.vendedor||'—'),
                e('td',{style:{padding:'9px 12px',whiteSpace:'nowrap'}},fmtD(p.dataPedido)||'—'),

                e('td',{style:{padding:'9px 12px',color:'var(--muted)',whiteSpace:'nowrap'}},p.etapa),
                e('td',{style:{padding:'9px 12px'}},
                  e('span',{style:{background:bgS(s),border:`1px solid ${bdS(s)}`,color:corS(s),borderRadius:5,padding:'2px 7px',fontSize:11,fontWeight:600,whiteSpace:'nowrap'}},lblS(s))
                ),
                e('td',{style:{padding:'9px 12px',color:'var(--accent2)',fontWeight:600}},ciclo!==null?ciclo+'d':'—'),
                e('td',{style:{padding:'9px 12px',color:'var(--muted)',maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.obs||'—')
              );
            })
          )
        )
      )
    )
  );
}

// ── RENDER ────────────────────────────────────────────
ReactDOM.render(e(App),document.getElementById('root'));
</script>
